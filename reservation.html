<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Amber 歸宅預約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --a50:#FAEEDA;--a100:#FAC775;--a200:#EF9F27;--a400:#BA7517;--a600:#854F0B;--a800:#633806;--a900:#412402;
  --bg:#1a1410;--bg2:#211a13;--bg3:#2a2118;
  --sur:rgba(250,238,218,0.06);--surh:rgba(250,238,218,0.1);
  --bdr:rgba(250,199,117,0.2);--bdrs:rgba(250,199,117,0.45);
  --tp:#faeeda;--ts:#c8a96e;--tm:rgba(250,238,218,0.45);
  --gold:#EF9F27;--gl:#FAC775;
}
html,body{background:var(--bg);min-height:100vh;font-family:'Noto Serif TC','Cormorant Garamond',serif;color:var(--tp)}
body{background:
  radial-gradient(ellipse 60% 40% at 20% 80%,rgba(186,117,23,0.08) 0%,transparent 60%),
  radial-gradient(ellipse 40% 60% at 85% 15%,rgba(239,159,39,0.06) 0%,transparent 50%),
  #1a1410;
  padding-bottom:3rem}

/* ── Header ── */
.hdr{text-align:center;padding:2.5rem 1.5rem 2rem;border-bottom:1px solid var(--bdr)}
.hdr-sub{font-size:10px;letter-spacing:.4em;color:var(--ts);text-transform:uppercase;margin-bottom:.5rem}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;letter-spacing:.14em;color:var(--gl);line-height:1}
.hdr p{font-size:12px;color:var(--tm);letter-spacing:.1em;margin-top:.5rem}
.orn{color:var(--gold);font-size:1rem;letter-spacing:.6em;margin:.45rem 0;opacity:.65}

/* ── Progress ── */
.pbr{display:flex;align-items:center;justify-content:center;padding:1.1rem 1.5rem;gap:0;border-bottom:1px solid var(--bdr);overflow-x:auto}
.sdot{display:flex;flex-direction:column;align-items:center;gap:4px}
.sdot .dot{width:26px;height:26px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tm);transition:all .3s}
.sdot.active .dot{border-color:var(--gold);background:rgba(239,159,39,0.15);color:var(--gold)}
.sdot.done .dot{border-color:var(--a400);background:var(--a800);color:var(--a100);cursor:pointer}
.sdot.done:hover .dot{background:var(--a600);border-color:var(--a200)}
.sdot .lbl{font-size:9px;color:var(--tm);letter-spacing:.04em;white-space:nowrap}
.sdot.active .lbl{color:var(--gold)}.sdot.done .lbl{color:var(--ts);cursor:pointer}
.sln{height:1px;width:22px;background:var(--bdr);margin-bottom:18px;flex-shrink:0;transition:background .3s}
.sln.done{background:var(--a400)}

/* ── Layout ── */
.wrap{max-width:640px;margin:0 auto;padding:2rem 1.5rem}
.stit{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--gl);letter-spacing:.1em;display:flex;align-items:center;gap:.65rem;margin-bottom:1.1rem}
.stit::before{content:'';display:block;width:16px;height:1px;background:var(--gold);opacity:.6}
.stit::after{content:'';display:block;flex:1;height:1px;background:var(--bdr)}

/* ── Boxes ── */
.nbox{background:rgba(239,159,39,0.06);border:1px solid var(--bdr);border-left:3px solid var(--gold);padding:1.1rem 1.3rem;border-radius:4px;font-size:13px;line-height:2;color:var(--ts);margin-bottom:1.25rem}
.nbox a{color:var(--gold);text-decoration:none;font-family:'Cormorant Garamond',serif;font-size:1.05rem;letter-spacing:.05em}
.nbox a:hover{color:var(--gl)}

/* ── Checkbox row ── */
.arow{display:flex;align-items:center;gap:.8rem;padding:.85rem 1.1rem;background:var(--sur);border:1px solid var(--bdr);border-radius:4px;cursor:pointer;transition:background .2s}
.arow:hover{background:var(--surh)}
.cchk{width:18px;height:18px;border:1px solid var(--bdrs);border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.cchk.on{background:var(--a400);border-color:var(--a400)}
.arow span{font-size:13px;color:var(--ts);line-height:1.6}

/* ── Form ── */
.flbl{display:block;font-size:11px;letter-spacing:.1em;color:var(--ts);margin-bottom:.4rem;text-transform:uppercase}
.flbl .req{color:var(--gold);margin-left:2px}
.frow{margin-bottom:1.2rem}
input[type="text"],input[type="email"],textarea,select{
  width:100%;background:var(--bg2);border:1px solid var(--bdr);color:var(--tp);
  padding:.65rem .9rem;border-radius:4px;font-size:13px;font-family:'Noto Serif TC',serif;
  transition:border-color .2s;appearance:none;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)}
select option{background:#2a2118}
textarea{resize:vertical;min-height:72px;line-height:1.7}

/* ── Time buttons ── */
.tgrd{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:7px;margin-top:.5rem}
.tbtn{padding:.55rem .4rem;border:1px solid var(--bdr);background:var(--bg2);color:var(--ts);border-radius:4px;font-size:12px;font-family:'Noto Serif TC',serif;cursor:pointer;text-align:center;transition:all .2s;line-height:1.4}
.tbtn:hover{border-color:var(--gold);color:var(--gl)}
.tbtn.sel{border-color:var(--gold);background:rgba(239,159,39,0.14);color:var(--gold)}
.tbtn.unav{opacity:.32;cursor:not-allowed;text-decoration:line-through}

/* ── Services ── */
.svc{border:1px solid var(--bdr);background:var(--bg2);border-radius:6px;padding:.9rem 1.1rem;margin-bottom:.6rem;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:.9rem}
.svc:hover{border-color:var(--bdrs);background:var(--surh)}
.svc.sel{border-color:var(--gold);background:rgba(239,159,39,0.07)}
.schk{width:17px;height:17px;border:1px solid var(--bdrs);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.svc.sel .schk{background:var(--a400);border-color:var(--a400)}
.si h4{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--tp);margin-bottom:2px;letter-spacing:.05em}
.si p{font-size:12px;color:var(--tm);line-height:1.55}
.sp{margin-left:auto;font-size:11.5px;color:var(--gold);text-align:right;flex-shrink:0;white-space:nowrap}
.sp .am{font-family:'Cormorant Garamond',serif;font-size:1.05rem;display:block}
.cpnl{background:rgba(186,117,23,0.08);border:1px solid var(--bdrs);border-radius:6px;padding:1.1rem 1.4rem;margin-top:1.2rem;display:flex;justify-content:space-between;align-items:center}
.ctot{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:300;color:var(--gl)}
.clbl{font-size:11px;color:var(--ts);letter-spacing:.1em}
.cunt{font-size:11px;color:var(--ts)}

/* ── Butler card grid ── */
.bcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.bcard{border:1px solid var(--bdr);background:var(--bg2);border-radius:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;display:flex;flex-direction:column}
.bcard:hover:not(.bkd){border-color:var(--bdrs);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.bcard.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(239,159,39,0.25)}
.bcard.bkd{opacity:.38;pointer-events:none;filter:grayscale(40%)}
.bcard-photo{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--gold);flex-shrink:0;position:relative}
.bcard-photo img{width:100%;height:100%;object-fit:cover;object-position:top}
.bcard-photo .bcard-initial{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--gold);opacity:.6}
.bcard.sel .bcard-photo::after{content:'✦';position:absolute;top:8px;right:10px;color:var(--gold);font-size:14px;text-shadow:0 0 8px rgba(239,159,39,0.8)}
.bcard-body{padding:.7rem .85rem .85rem;flex:1;display:flex;flex-direction:column;gap:4px}
.bcard-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--tp);letter-spacing:.06em}
.bcard-tag{font-size:10px;color:var(--tm)}
.bcard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.4rem;gap:.35rem}
.bcard-status{font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0}
.bcard-status.av{background:rgba(99,152,34,0.15);color:#97C459}
.bcard-status.bk{background:rgba(162,45,45,0.15);color:#F09595}
.bcard-profile{font-size:10px;padding:2px 7px;border:1px solid var(--bdr);border-radius:20px;background:transparent;color:var(--ts);text-decoration:none;transition:all .2s;white-space:nowrap}
.bcard-profile:hover{border-color:var(--gold);color:var(--gold)}
.bcard.sel .bcard-status{display:none}
.bcard.sel .bcard-name{color:var(--gold)}
.nopref{display:flex;align-items:center;gap:.65rem;padding:.8rem 1.1rem;border:1px dashed var(--bdr);border-radius:6px;cursor:pointer;font-size:13px;color:var(--ts);margin-top:.75rem;transition:all .2s}
.nopref:hover{border-color:var(--bdrs);color:var(--tp)}
.nopref.sel{border-color:var(--gold);color:var(--gold)}
.rrdo{width:15px;height:15px;border-radius:50%;border:1px solid var(--bdrs);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.rrdo.on{border-color:var(--gold);background:var(--gold)}
.rrdo.on::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--bg);display:block}

/* ── RP ── */
.ropt{display:flex;align-items:flex-start;gap:.65rem;padding:.8rem 1.1rem;border:1px solid var(--bdr);border-radius:6px;cursor:pointer;margin-bottom:.55rem;transition:all .2s;background:var(--bg2)}
.ropt:hover{border-color:var(--bdrs)}
.ropt.sel{border-color:var(--gold);background:rgba(239,159,39,0.06)}
.ropt.sel .rrdo{border-color:var(--gold);background:var(--gold)}
.ropt.sel .rrdo::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--bg);display:block}
.rtxt{font-size:13px;color:var(--ts);line-height:1.6}
.rtxt strong{color:var(--tp);display:block;font-weight:500;font-size:13.5px;margin-bottom:1px}
.ttag{padding:.3rem .85rem;border:1px solid var(--bdr);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg2);color:var(--ts);transition:all .2s;display:inline-block}
.ttag:hover{border-color:var(--bdrs);color:var(--tp)}
.ttag.on{border-color:var(--gold);background:rgba(239,159,39,0.1);color:var(--gold)}

/* ── Summary ── */
.smr{display:flex;justify-content:space-between;align-items:baseline;padding:.55rem 0;border-bottom:1px solid rgba(250,199,117,0.1);font-size:13px}
.smr .sk{color:var(--tm);flex-shrink:0}
.smr .sv{color:var(--tp);text-align:right;margin-left:.75rem}
.smrt{display:flex;justify-content:space-between;padding:.8rem 0;font-family:'Cormorant Garamond',serif}
.smrt .tk{font-size:13px;color:var(--ts);letter-spacing:.1em}
.smrt .tv{font-size:1.4rem;color:var(--gl)}
.sbox{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;padding:1.1rem 1.3rem;margin-bottom:1.25rem}
.divl{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--bdrs),transparent);margin:.4rem 0}

/* ── Buttons ── */
.bnxt{display:block;width:100%;padding:.88rem;background:linear-gradient(135deg,var(--a400),var(--a200));border:none;border-radius:4px;color:var(--a900);font-family:'Noto Serif TC',serif;font-size:13.5px;letter-spacing:.15em;cursor:pointer;margin-top:1.75rem;transition:opacity .2s;font-weight:500}
.bnxt:hover{opacity:.88}.bnxt:disabled{opacity:.3;cursor:not-allowed}
.bbk{display:block;width:100%;padding:.7rem;background:transparent;border:1px solid var(--bdr);border-radius:4px;color:var(--ts);font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:.1em;cursor:pointer;margin-top:.6rem;transition:all .2s}
.bbk:hover{border-color:var(--bdrs);color:var(--tp)}

/* ── Success ── */
.succ{text-align:center;padding:3rem 1.5rem}
.succ-ic{font-size:2.5rem;color:var(--gold);margin-bottom:1.1rem}
.succ h2{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:300;color:var(--gl);letter-spacing:.12em;margin-bottom:.65rem}
.succ p{font-size:13px;color:var(--ts);line-height:2.1}
.dcbtn{display:inline-flex;align-items:center;gap:.55rem;margin-top:2rem;padding:.85rem 2rem;background:#5865F2;border:none;border-radius:6px;color:#fff;font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:.08em;cursor:pointer;transition:opacity .2s;text-decoration:none}
.dcbtn:hover{opacity:.88}

/* ── Info note ── */
.infonote{font-size:11px;color:var(--tm);letter-spacing:.05em;line-height:1.9;text-align:center;margin-bottom:1.25rem}

/* ── Desig note ── */
.dnote{margin-top:.85rem;font-size:12px;color:var(--gold);padding:.65rem 1rem;border:1px solid rgba(239,159,39,0.3);border-radius:4px;background:rgba(239,159,39,0.06)}

/* ── No dates ── */
.nodate{text-align:center;padding:2.5rem 1rem;color:var(--tm);font-size:13px;line-height:2}

.fgrd{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
@media(max-width:480px){.fgrd{grid-template-columns:1fr}}

.fade{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-sub">F F 1 4 · 繁 中 服 · 鳳 凰</div>
  <div class="orn">✦ ✦ ✦</div>
  <h1>The Amber</h1>
  <p>琥珀執事咖啡廳　歸宅預約</p>
</div>

<div id="pbr" class="pbr"></div>
<div id="main" class="wrap"></div>

<script>
// ═══════════════════════════════════════════════
//  STORAGE KEY（與後台共用）
// ═══════════════════════════════════════════════
const STORAGE_KEY_SCHEDULE = 'amber_schedule';
const STORAGE_KEY_RES = 'amber_reservations';
const DC_LINK = 'https://discord.gg/9erfcz2ud5';

// ═══════════════════════════════════════════════
//  執事 & 攝影師 & 服務定義
// ═══════════════════════════════════════════════
let BUTLERS = [
  {id:'b1',name:'亞修',initial:'亞',tag:'執事長'},
  {id:'b2',name:'萊昂',initial:'萊',tag:'資深執事'},
  {id:'b3',name:'艾倫',initial:'艾',tag:'執事'},
  {id:'b4',name:'克勞德',initial:'克',tag:'執事'},
  {id:'b5',name:'伊森',initial:'伊',tag:'見習執事'},
];

let PHOTOGRAPHERS = [
  {id:'p1',name:'Hinako',initial:'H',price:120000,portfolioUrl:'https://hinakoff14tc.carrd.co/',photo:''},
  {id:'p2',name:'煙鏡',initial:'煙',price:20000,portfolioUrl:'https://rainy-powder-d75.notion.site/mirrorsmoke?source=copy_link',photo:''},
];

const SERVICES = [
  {id:'afternoon',name:'宅邸午茶',desc:'純享用餐點，不受任何執事打擾（現場可追加預約）',price:0,dur:30,canDesig:false},
  {id:'call30',name:'優雅呼喚',desc:'享用餐點，與執事一同談心陪伴（30分鐘）',price:60000,dur:30,extra:40000,canDesig:true},
  {id:'private',name:'專屬時光',desc:'主題式包廂空間，您的私人隱密空間',price:40000,dur:30,canDesig:false},
  {id:'photo',name:'衷心之影',desc:'指定攝影師拍立得一張，化作永恆的珍貴時刻',price:0,dur:15,canDesig:true,needPhoto:true},
];

const STEPS_BASE = [
  {id:'agree',label:'宅邸規範'},
  {id:'datetime',label:'日期時段'},
  {id:'service',label:'服務選擇'},
  {id:'butler',label:'指名執事'},
  {id:'rp',label:'RP設定'},
  {id:'info',label:'基本資料'},
  {id:'confirm',label:'確認送出'},
];
// 有衷心之影（不管有沒有優雅呼喚）：執事 → 攝影師
const STEPS_WITH_PHOTO = [
  {id:'agree',label:'宅邸規範'},
  {id:'datetime',label:'日期時段'},
  {id:'service',label:'服務選擇'},
  {id:'butler',label:'指名執事'},
  {id:'photographer',label:'攝影師'},
  {id:'rp',label:'RP設定'},
  {id:'info',label:'基本資料'},
  {id:'confirm',label:'確認送出'},
];

function getSteps(){
  return st.services.includes('photo') ? STEPS_WITH_PHOTO : STEPS_BASE;
}

// ═══════════════════════════════════════════════
//  狀態
// ═══════════════════════════════════════════════
let schedule = {};
let reservations = [];
let st = {
  step:0, agreed:false, date:'', time:'',
  services:[], designated:false, butler:null,
  photographer:null,
  rp:'', rpTitle:'', rpTitleCustom:'', rpNote:'',
  gameName:'', server:'', contact:'', notes:''
};

// ═══════════════════════════════════════════════
//  Google Sheets API
// ═══════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwOrMIcW91ETRqsGN_dA_kTmHKcf1P-RDgxbIAIXDptFTeNVU0qxj1cvv6iiyIJYxPR/exec';

async function apiGet(action){
  try{
    const res = await fetch(`${API_URL}?action=${action}`);
    return await res.json();
  }catch(e){ return null; }
}

async function apiPost(action, data){
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      body: JSON.stringify({action, data}),
    });
    return await res.json();
  }catch(e){ return null; }
}

async function loadData(){
  showLoading(true);
  try{
    const [sched, res, butlers, photographers] = await Promise.all([
      apiGet('getSchedule'),
      apiGet('getReservations'),
      apiGet('getButlers'),
      apiGet('getPhotographers'),
    ]);
    if(sched) schedule = sched;
    if(Array.isArray(res)) reservations = res;
    if(Array.isArray(butlers) && butlers.length>0) BUTLERS = butlers;
    if(Array.isArray(photographers) && photographers.length>0) PHOTOGRAPHERS = photographers;
  }catch(e){}
  showLoading(false);
}

async function saveReservations(){
  return await apiPost('saveReservations', reservations);
}

function showLoading(on){
  let el = document.getElementById('loading-overlay');
  if(on){
    if(!el){
      el = document.createElement('div');
      el.id = 'loading-overlay';
      el.style.cssText = 'position:fixed;inset:0;background:rgba(26,20,16,0.85);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:"Noto Serif TC",serif;color:var(--gl);font-size:14px;letter-spacing:.15em;';
      el.innerHTML = '<div style="text-align:center"><div style="font-size:1.5rem;color:var(--gold);margin-bottom:.75rem;">✦</div>載入中，請稍候...</div>';
      document.body.appendChild(el);
    }
    el.style.display='flex';
  } else {
    if(el) el.style.display='none';
  }
}

// ═══════════════════════════════════════════════
//  時段邏輯
// ═══════════════════════════════════════════════
function getAvailTimes(dateStr){
  const d=schedule[dateStr];
  if(!d||!d.open) return [];
  const times=(d.times||[]).slice().sort();
  // 只保留整點（XX:00），排除 XX:30
  // 再去掉最後一個整點（打烊時間，不可作為預約起始）
  const wholeTimes=times.filter(t=>t.endsWith(':00'));
  if(wholeTimes.length>1) return wholeTimes.slice(0,-1);
  return [];
}

// 取得執事在某日可作為預約起始的時段（只顯示整點，排除最後一個整點）
function getButlerBookableTimes(dateStr, butlerId){
  const day=schedule[dateStr];
  if(!day) return [];
  let shifts=[];
  if(day.butlerShifts !== undefined){
    shifts=(day.butlerShifts[butlerId]||[]).slice().sort();
  } else {
    shifts=(day.times||[]).slice().sort();
  }
  // 同樣只保留整點，排除最後一個整點
  const wholeTimes=shifts.filter(t=>t.endsWith(':00'));
  if(wholeTimes.length>1) return wholeTimes.slice(0,-1);
  return [];
}

// 某執事在某日某時段是否可被預約（在執事可預約起始時段內）
function isButlerOnDutyAtTime(dateStr, butlerId, time){
  return getButlerBookableTimes(dateStr, butlerId).includes(time);
}

// 回傳某日某執事的時段狀態：{time, offDuty, blocked}
function getButlerTimesStatus(dateStr, butlerId){
  const allTimes=getAvailTimes(dateStr);
  const dayRes=reservations.filter(r=>r.date===dateStr && r.butler===butlerId && (r.status||'new')!=='cancelled');
  const blocked=new Set();
  dayRes.forEach(r=>{
    // 只封鎖已被預約的整點本身
    // XX:30 已從 allTimes 排除，緩衝自然存在，不需要再封鎖下一格
    if(allTimes.includes(r.time)) blocked.add(r.time);
  });
  return allTimes.map(t=>({
    time:t,
    offDuty: !isButlerOnDutyAtTime(dateStr, butlerId, t),
    blocked: blocked.has(t),
  }));
}

function calcTotal(){
  let t=0;
  const hasDesig=st.designated&&st.butler&&st.butler!=='none';
  st.services.forEach(sid=>{
    const s=SERVICES.find(x=>x.id===sid);
    if(s){ t+=s.price; if(hasDesig&&s.extra) t+=s.extra; }
  });
  // 攝影師費用
  if(st.photographer){
    const p=PHOTOGRAPHERS.find(x=>x.id===st.photographer);
    if(p) t+=p.price;
  }
  return t;
}

// 攝影師在某日某時段的排班（同執事邏輯）
function getPhotographerBookableTimes(dateStr, photoId){
  const day=schedule[dateStr];
  if(!day) return [];
  let shifts=[];
  if(day.photographerShifts!==undefined){
    shifts=(day.photographerShifts[photoId]||[]).slice().sort();
  } else {
    return [];
  }
  const wholeTimes=shifts.filter(t=>t.endsWith(':00'));
  if(wholeTimes.length>1) return wholeTimes.slice(0,-1);
  return [];
}

const PHOTOGRAPHER_MAX_PER_SLOT = 4; // 每個時段最多可接受的預約數

function getPhotographerBookingCount(dateStr, photoId, time){
  return reservations.filter(r=>
    r.date===dateStr && r.photographer===photoId && r.time===time && (r.status||'new')!=='cancelled'
  ).length;
}

function isPhotographerAvailable(dateStr, photoId, time){
  const bookable=getPhotographerBookableTimes(dateStr, photoId);
  if(!bookable.includes(time)) return false;
  // 該時段預約數未達上限才算可預約
  return getPhotographerBookingCount(dateStr, photoId, time) < PHOTOGRAPHER_MAX_PER_SLOT;
}

function setMain(html){
  const m=document.getElementById('main');
  m.className='wrap fade';
  m.innerHTML=html;
}

function renderProgress(){
  const STEPS=getSteps();
  document.getElementById('pbr').innerHTML=STEPS.map((s,i)=>{
    let cls='';
    if(i<st.step) cls='done';
    else if(i===st.step) cls='active';
    const clickable = i<st.step;
    return (i===0?'':
      `<div class="sln${i<=st.step?' done':''}"></div>`)+
      `<div class="sdot ${cls}" ${clickable?`onclick="jumpToStep(${i})" title="返回${s.label}"`:''}>
        <div class="dot">${i<st.step?'✓':i+1}</div>
        <div class="lbl">${s.label}</div>
      </div>`;
  }).join('');
}

function render(){
  renderProgress();
  const STEPS=getSteps();
  const id=STEPS[st.step]?.id;
  if(id==='agree') renderAgree();
  else if(id==='datetime') renderDatetime();
  else if(id==='service') renderService();
  else if(id==='butler') renderButler();
  else if(id==='photographer') renderPhotographer();
  else if(id==='rp') renderRP();
  else if(id==='info') renderInfo();
  else if(id==='confirm') renderConfirm();
}

// ═══════════════════════════════════════════════
//  事件處理
// ═══════════════════════════════════════════════
function selectPhotographer(id){ st.photographer=id; render(); }
function toggleAgree(){ st.agreed=!st.agreed; render(); }
function next(){ st.step++; render(); }
function prev(){ st.step--; render(); }
function jumpToStep(i){ if(i<st.step){ st.step=i; render(); } }
function selectDate(v){ st.date=v; st.time=''; render(); }
function selectTime(t){ st.time=t; render(); }
function toggleSvc(id){
  const i=st.services.indexOf(id);
  if(i===-1) st.services.push(id); else st.services.splice(i,1);
  // 若取消勾選衷心之影，清空已選攝影師
  if(id==='photo' && !st.services.includes('photo')) st.photographer=null;
  render();
}
function selectButler(id){ st.butler=id; st.designated=(id!=='none'); render(); }
function selectRP(id){ st.rp=id; render(); }
function selectRPTitle(t){ st.rpTitle=t; render(); }

function collectRP(){
  st.rpNote=document.getElementById('inp-rpnote')?.value||'';
  if(st.rpTitle==='自訂') st.rpTitleCustom=document.getElementById('inp-ctitle')?.value||'';
  if(!st.rp){ alert('請選擇 RP 設定'); return; }
  if(!st.rpTitle){ alert('請選擇稱謂'); return; }
  if(st.rpTitle==='自訂'&&!st.rpTitleCustom.trim()){ alert('請填寫自訂稱謂'); return; }
  next();
}

function collectInfo(){
  const gn=document.getElementById('inp-game')?.value?.trim()||'';
  const sv=document.getElementById('inp-server')?.value||'';
  const ct=document.getElementById('inp-contact')?.value?.trim()||'';
  if(!gn||!sv||!ct){ alert('請填寫所有必填欄位（標有 * 號）'); return; }
  st.gameName=gn; st.server=sv; st.contact=ct;
  st.notes=document.getElementById('inp-notes')?.value||'';
  next();
}

async function submitRes(){
  const day=schedule[st.date];
  if(!day||!day.open){ alert('此日期已關閉預約，請重新選擇日期。'); st.step=1; render(); return; }
  const availTimes=getAvailTimes(st.date);
  if(!availTimes.includes(st.time)){ alert(`${st.time} 時段已不在開放預約的時段內，請重新選擇時段。`); st.step=1; st.time=''; render(); return; }
  if(st.butler&&st.butler!=='none'){
    if(!isButlerOnDutyAtTime(st.date,st.butler,st.time)){
      const bName=BUTLERS.find(b=>b.id===st.butler)?.name||'該執事';
      alert(`${bName} 在 ${st.time} 已無排班，請重新選擇執事。`);
      st.step=3; st.butler=null; st.designated=false; render(); return;
    }
    const timeStatus=getButlerTimesStatus(st.date,st.butler);
    const slotStatus=timeStatus.find(ts=>ts.time===st.time);
    if(slotStatus?.blocked){
      const bName=BUTLERS.find(b=>b.id===st.butler)?.name||'該執事';
      alert(`${bName} 在 ${st.time} 已被預約，請重新選擇執事或時段。`);
      st.step=3; st.butler=null; st.designated=false; render(); return;
    }
  }
  // 攝影師驗證
  if(st.services.includes('photo')){
    if(!st.photographer){ alert('請選擇攝影師。'); st.step=getSteps().findIndex(s=>s.id==='photographer'); render(); return; }
    if(!isPhotographerAvailable(st.date, st.photographer, st.time)){
      const pName=PHOTOGRAPHERS.find(p=>p.id===st.photographer)?.name||'該攝影師';
      alert(`${pName} 在 ${st.time} 已無法預約，請重新選擇。`);
      st.step=getSteps().findIndex(s=>s.id==='photographer'); st.photographer=null; render(); return;
    }
  }
  const res={
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    date:st.date, time:st.time,
    services:[...st.services],
    designated:st.designated, butler:st.butler,
    photographer:st.photographer||null,
    rp:st.rp, rpTitle:st.rpTitle, rpTitleCustom:st.rpTitleCustom, rpNote:st.rpNote,
    gameName:st.gameName, server:st.server, contact:st.contact, notes:st.notes,
    total:calcTotal(),
    status:'new',
    createdAt:new Date().toISOString(),
  };
  reservations.push(res);
  showLoading(true);
  await saveReservations();
  showLoading(false);
  renderSuccess(st.gameName);
}

function resetForm(){
  st={step:0,agreed:false,date:'',time:'',services:[],designated:false,butler:null,
      photographer:null,rp:'',rpTitle:'',rpTitleCustom:'',rpNote:'',gameName:'',server:'',contact:'',notes:''};
  render();
}

// ═══════════════════════════════════════════════
//  工具
// ═══════════════════════════════════════════════
function chkSvg(){ return '<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1,5 4,8 10,2" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════
(async ()=>{
  await loadData();
  render();
})();
</script>
